<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESHU CODEX | Free Fire Friend Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --neon-blue: #00f2fe;
            --neon-green: #00ff87;
            --neon-red: #ff0055;
            --text-main: #c5a1ff;
            --text-light: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a103c 0%, #0b0c10 100%);
        }

        /* Container Layout */
        .panel-container {
            width: 100%;
            max-width: 480px;
            padding: 30px 20px;
            background: rgba(31, 40, 51, 0.65);
            border: 2px solid rgba(0, 242, 254, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.1);
            text-align: center;
            position: relative;
            margin: 15px;
        }

        /* Header / Branding Styling */
        .brand-header {
            margin-bottom: 30px;
        }

        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-light);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px rgba(0, 242, 254, 0.5);
            margin-bottom: 5px;
        }

        .brand-logo span {
            color: var(--neon-blue);
        }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #85929E;
            font-weight: 600;
        }

        /* Input Styling */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-blue);
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .uid-input {
            width: 100%;
            padding: 16px 16px 16px 45px;
            background: rgba(11, 12, 16, 0.8);
            border: 2px solid #2c3b4e;
            border-radius: 8px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            outline: none;
            transition: all 0.3s ease;
        }

        .uid-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        /* Button Layout */
        .action-container {
            display: grid;
            grid-template-columns: 1xl 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #0b0c10;
        }

        .btn-add {
            background: linear-gradient(45deg, var(--neon-green), #00e1d9);
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 135, 0.5);
        }

        .btn-remove {
            background: linear-gradient(45deg, var(--neon-red), #ff5e62);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
        }

        .btn-remove:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 85, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Console Log Window / Feedback System */
        .terminal-box {
            background: #060709;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            min-height: 80px;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .status-text {
            color: #85929E;
            line-height: 1.4;
        }

        .status-success { color: #00ff87; }
        .status-error { color: #ff0055; }
        .status-process { color: #00f2fe; }

        /* Footer Decoration */
        .footer-credits {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #566573;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="panel-container">
        <div class="brand-header">
            <h1 class="brand-logo">ESHU <span>CODEX</span></h1>
            <p class="subtitle">FF Friend Controller System</p>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-crosshairs"></i>
            <input type="number" id="playerUid" class="uid-input" placeholder="ENTER PLAYER UID..." autocomplete="off">
        </div>

        <div class="action-container">
            <button class="btn btn-add" id="addBtn" onclick="processFriendAction('add')">
                <i class="fa-solid fa-user-plus"></i> Add Friend
            </button>
            <button class="btn btn-remove" id="removeBtn" onclick="processFriendAction('remove')">
                <i class="fa-solid fa-user-minus"></i> Remove Friend
            </button>
        </div>

        <div class="terminal-box" id="terminalBox">
            <div class="status-text" id="statusMessage">> System ready. Awaiting operational parameters...</div>
        </div>

        <div class="footer-credits">
            &copy; 2026 ESHU CODEX DIGITAL SERVICES. All Rights Reserved.
        </div>
    </div>

    <script>
        async function processFriendAction(actionType) {
            const uidInput = document.getElementById('playerUid').value.trim();
            const statusMessage = document.getElementById('statusMessage');
            const addBtn = document.getElementById('addBtn');
            const removeBtn = document.getElementById('removeBtn');

            // Basic Client-Side Validation
            if (!uidInput) {
                statusMessage.innerHTML = `<span class="status-error">[ERROR] Request Denied: Target Player UID field is empty.</span>`;
                return;
            }

            // Set Loading States
            addBtn.disabled = true;
            removeBtn.disabled = true;
            statusMessage.innerHTML = `<span class="status-process">[PROCESSING] Initiating ${actionType === 'add' ? 'addition' : 'removal'} payload for target sequence: ${uidInput}...</span>`;

            // Build API Target Endpoints
            const baseUrl = "https://frnd-control-eshu.vercel.app/";
            const path = actionType === 'add' ? 'adding_friend' : 'remove_friend';
            const targetUrl = `${baseUrl}${path}?uid=4418615729&password=eshucordexx_K32CI_BY_SPIDEERIO_GAMING_HXIIM&friend_uid=${uidInput}&key=Flash`;

            try {
                // Execute API Call request sequence
                const response = await fetch(targetUrl);
                
                if (response.ok) {
                    statusMessage.innerHTML = `<span class="status-success">[SUCCESS] Request successfully transmitted. Server acknowledged command for UID: ${uidInput}.</span>`;
                } else {
                    statusMessage.innerHTML = `<span class="status-error">[SERVER ERROR] Transmission failed. Code: ${response.status}. Verify parameters.</span>`;
                }
            } catch (error) {
                // Handle Network or CORS errors cleanly
                statusMessage.innerHTML = `<span class="status-error">[NETWORK ERROR] Connection timed out or failed to reach terminal hook. Check your console.</span>`;
                console.error("API Error: ", error);
            } finally {
                // Reset interaction availability
                addBtn.disabled = false;
                removeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
